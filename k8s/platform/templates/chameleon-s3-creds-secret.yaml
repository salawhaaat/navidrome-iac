# Chameleon Cloud RGW S3 credentials (EC2-style, generated via Keystone)
# for navidrome-serve. Used by both the track_dict and audio loaders to
# read directly from Swift's S3-compatible endpoint.
#
# This file is committed with empty values; the real credentials must be
# applied separately so they never enter git history. From the cluster:
#
#   kubectl create secret generic chameleon-s3-creds -n navidrome-platform \
#     --from-literal=access_key_id=<EC2_ACCESS> \
#     --from-literal=secret_access_key=<EC2_SECRET> \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Generate values via (on a host with openstack CLI + Chameleon auth sourced):
#   openstack ec2 credentials create
#
# The S3 endpoint itself is non-secret:
#   https://chi.uc.chameleoncloud.org:7480
apiVersion: v1
kind: Secret
metadata:
  name: chameleon-s3-creds
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  access_key_id: ""
  secret_access_key: ""
