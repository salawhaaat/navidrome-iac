---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: serve-artifacts-pvc
  namespace: navidrome-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome-serve
  namespace: navidrome-platform
  labels:
    app: navidrome-serve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: navidrome-serve
  template:
    metadata:
      labels:
        app: navidrome-serve
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: serve
          image: registry.kube-system.svc.cluster.local:5000/navidrome-serve:latest
          imagePullPolicy: Always
          command: [sh, -c]
          args:
            - |
              sed -i 's/            top_n=1,$/            top_n=1,\n            exclude_sets=[set()],/' /app/app.py
              exec uvicorn app:app --host 0.0.0.0 --port 8080
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: MLFLOW_TRACKING_URI
              value: ""
            - name: VOCAB_PATH
              value: "/app/artifacts/vocabs.pkl"
            - name: MODEL_PATH
              value: "/app/artifacts/best_gru4rec.pt"
            - name: DEVICE
              value: "cpu"
            - name: MINIO_URL
              value: "http://minio.navidrome-platform.svc.cluster.local:9000"
            - name: MINIO_USER
              value: "minioadmin"
            - name: MINIO_PASSWORD
              value: "MyMinioPassword123"
            - name: MINIO_BUCKET
              value: "artifacts"
            - name: MINIO_POPULARITY_KEY
              value: "shared/v20260418-001/popularity.npy"
            - name: POPULARITY_PATH
              # Pin to /tmp so a stale empty file on the artifacts PVC (left
              # behind by a failed download) can't break startup. The boto3
              # download in app.py opens the dest file before fetching, so a
              # 404 leaves an empty file that np.load chokes on.
              value: "/tmp/popularity.npy"
            # Track metadata + audio both read from Chameleon RGW S3 directly.
            # Swift is the durable source of truth — survives MinIO wipes.
            # boto3 talks to RGW's S3-compatible endpoint with EC2 creds.
            # Model + popularity stay on MinIO (MLflow's backing store).
            - name: TRACK_META_BUCKET
              value: "navidrome-bucket-proj05"
            - name: TRACK_META_KEY
              value: "metadata/track_dict.parquet"
            - name: TRACK_META_ENDPOINT_URL
              value: "https://chi.uc.chameleoncloud.org:7480"
            - name: TRACK_META_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chameleon-s3-creds
                  key: access_key_id
            - name: TRACK_META_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chameleon-s3-creds
                  key: secret_access_key
            - name: AUDIO_BUCKET
              value: "navidrome-bucket-proj05"
            - name: AUDIO_KEY_PREFIX
              value: "audio_complete/"
            - name: AUDIO_ENDPOINT_URL
              value: "https://chi.uc.chameleoncloud.org:7480"
            - name: AUDIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chameleon-s3-creds
                  key: access_key_id
            - name: AUDIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chameleon-s3-creds
                  key: secret_access_key
          volumeMounts:
            - name: artifacts
              mountPath: /app/artifacts
          resources:
            # 4Gi limit needed for the track_dict load: the parquet itself
            # is 108 MB but pyarrow's table representation + the 745k-entry
            # Python dict (~300 MB) + model (191 MB) + vocab (~100 MB) +
            # transient buffers peak around 1.5-2 GB. 2 GiB OOM-killed.
            # Steady-state usage is ~1.5 GB after startup.
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: serve-artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: navidrome-serve
  namespace: navidrome-platform
  labels:
    app: navidrome-serve
spec:
  selector:
    app: navidrome-serve
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
