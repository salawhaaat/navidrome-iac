---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data-pvc
  namespace: navidrome-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# PersistentVolume backed by secondary disk (/mnt/music-vol, 98GB) on node1.
# Music data lives at /mnt/music-vol/music/audio_complete and is preserved across pod restarts.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: navidrome-music-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  local:
    path: /mnt/music-vol/music/audio_complete
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - node1
---
# PV for music is manually created, backed by /mnt/music-vol (secondary disk, 98GB)
# See navidrome-music-pv PersistentVolume which references the node's /mnt/music-vol/music/audio_complete
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-music-pvc
  namespace: navidrome-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: navidrome-music-pv
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: navidrome-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      containers:
        - name: navidrome
          image: registry.kube-system.svc.cluster.local:5000/navidrome-custom:latest
          ports:
            - containerPort: 4533
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: ND_MUSICFOLDER
              value: /music
            - name: ND_DATAFOLDER
              value: /data
            - name: ND_LOGLEVEL
              value: info
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: navidrome_dbname
            - name: ND_DBPATH
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres/$(POSTGRES_DB)?sslmode=disable"
            {{- if .Values.navidrome.lastfmApiKey }}
            - name: ND_LASTFM_APIKEY
              value: {{ .Values.navidrome.lastfmApiKey | quote }}
            - name: ND_LASTFM_SECRET
              value: {{ .Values.navidrome.lastfmSecret | quote }}
            {{- end }}
            {{- if .Values.navidrome.spotifyClientId }}
            - name: ND_SPOTIFY_ID
              value: {{ .Values.navidrome.spotifyClientId | quote }}
            - name: ND_SPOTIFY_SECRET
              value: {{ .Values.navidrome.spotifyClientSecret | quote }}
            {{- end }}
          volumeMounts:
            - name: navidrome-data
              mountPath: /data
            - name: navidrome-music
              mountPath: /music
      volumes:
        - name: navidrome-data
          persistentVolumeClaim:
            claimName: navidrome-data-pvc
        - name: navidrome-music
          persistentVolumeClaim:
            claimName: navidrome-music-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: navidrome
  namespace: navidrome-platform
spec:
  selector:
    app: navidrome
  ports:
    - port: 4533
      targetPort: 4533
  externalIPs:
    - {{ .Values.navidrome.externalIP }}
