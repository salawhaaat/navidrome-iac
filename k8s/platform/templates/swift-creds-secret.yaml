# Swift (Chameleon Cloud) application credentials for navidrome-serve.
#
# This file is committed with empty values; the real credentials must be
# applied separately so they never enter git history. From the cluster:
#
#   kubectl create secret generic swift-creds -n navidrome-platform \
#     --from-literal=application_credential_id=<ID> \
#     --from-literal=application_credential_secret=<SECRET> \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Get values from Chameleon dashboard → Identity → Application Credentials,
# or from the same source scripts/enrich_audio_swift.py uses.
apiVersion: v1
kind: Secret
metadata:
  name: swift-creds
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  application_credential_id: ""
  application_credential_secret: ""
